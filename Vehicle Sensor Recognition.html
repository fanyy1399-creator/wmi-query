<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🔍 传感器图形识别挑战</title>
    <style>
        /* ===== 全局重置 & 字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #dce8f5, #b0c8e0);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 18px 14px 30px;
        }

        .game-wrapper {
            max-width: 1150px;
            width: 100%;
            background: rgba(255, 255, 255, 0.50);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 44px;
            padding: 24px 28px 32px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            box-shadow: 0 30px 80px rgba(60, 80, 110, 0.15);
        }

        /* ===== 头部 ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px 18px;
            margin-bottom: 22px;
        }

        .title-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .title-group .logo {
            font-size: 30px;
        }
        .title-group h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a2c44;
            letter-spacing: 0.3px;
        }
        .title-group .sub {
            font-size: 13px;
            color: #4a6080;
            font-weight: 400;
            margin-left: 4px;
        }

        .stats {
            display: flex;
            align-items: center;
            gap: 18px;
            background: rgba(255, 255, 255, 0.50);
            padding: 6px 18px 6px 22px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            flex-wrap: wrap;
            backdrop-filter: blur(4px);
        }
        .stats .score {
            color: #2a4060;
            font-size: 15px;
            font-weight: 500;
        }
        .stats .score span {
            color: #0a1e3a;
            font-weight: 700;
            font-size: 20px;
        }
        .stats .progress-wrap {
            width: 110px;
            height: 5px;
            background: rgba(60, 80, 120, 0.15);
            border-radius: 6px;
            overflow: hidden;
        }
        .stats .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a8ecf, #2a6aaa);
            border-radius: 6px;
            transition: width 0.5s ease;
        }
        .stats .count {
            color: #4a6080;
            font-size: 14px;
            min-width: 50px;
            text-align: right;
        }
        .stats .timer {
            color: #4a6080;
            font-size: 14px;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .stats .timer span {
            color: #1a3c6a;
            font-weight: 600;
            min-width: 28px;
        }

        /* ===== 放置区 ===== */
        .drop-zones {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }

        .drop-zone {
            background: rgba(255, 255, 255, 0.35);
            border: 2px dashed rgba(60, 80, 120, 0.15);
            border-radius: 22px;
            padding: 14px 14px 16px;
            min-height: 160px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
            backdrop-filter: blur(4px);
        }
        .drop-zone.drag-over {
            border-color: rgba(40, 80, 160, 0.40);
            background: rgba(255, 255, 255, 0.55);
            transform: scale(1.01);
            box-shadow: 0 0 40px rgba(40, 80, 160, 0.08);
        }

        .drop-zone .zone-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(60, 80, 120, 0.10);
        }
        .drop-zone .zone-header .icon {
            font-size: 20px;
        }
        .drop-zone .zone-header .label {
            font-size: 16px;
            font-weight: 600;
            color: #1a2c44;
            letter-spacing: 0.3px;
        }
        .drop-zone .zone-header .badge {
            margin-left: auto;
            background: rgba(60, 80, 120, 0.08);
            padding: 1px 14px;
            border-radius: 30px;
            font-size: 13px;
            color: #3a5a7a;
            font-weight: 500;
        }

        .drop-zone .zone-items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex: 1;
            align-content: flex-start;
            min-height: 50px;
        }
        .drop-zone .zone-items .chip {
            background: rgba(255, 255, 255, 0.60);
            padding: 4px 14px 4px 10px;
            border-radius: 30px;
            font-size: 13px;
            color: #1a2c44;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .drop-zone .zone-items .chip .mini-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .drop-zone .zone-items .chip .mini-icon canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .drop-zone .empty-hint {
            color: rgba(60, 80, 120, 0.25);
            font-size: 14px;
            width: 100%;
            text-align: center;
            padding: 14px 0;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* 各区域主题 */
        .drop-zone.zone-camera {
            border-color: rgba(40, 80, 160, 0.15);
        }
        .drop-zone.zone-camera .zone-header .label {
            color: #1a4a7a;
        }
        .drop-zone.zone-camera .zone-items .chip {
            background: rgba(40, 80, 160, 0.08);
            border-color: rgba(40, 80, 160, 0.10);
        }
        .drop-zone.zone-camera.drag-over {
            border-color: #3a7abf;
            background: rgba(40, 80, 160, 0.04);
        }

        .drop-zone.zone-module {
            border-color: rgba(30, 120, 70, 0.15);
        }
        .drop-zone.zone-module .zone-header .label {
            color: #1a7a4a;
        }
        .drop-zone.zone-module .zone-items .chip {
            background: rgba(30, 120, 70, 0.08);
            border-color: rgba(30, 120, 70, 0.10);
        }
        .drop-zone.zone-module.drag-over {
            border-color: #2a9a6a;
            background: rgba(30, 120, 70, 0.04);
        }

        .drop-zone.zone-radar {
            border-color: rgba(180, 100, 20, 0.15);
        }
        .drop-zone.zone-radar .zone-header .label {
            color: #a06020;
        }
        .drop-zone.zone-radar .zone-items .chip {
            background: rgba(180, 100, 20, 0.08);
            border-color: rgba(180, 100, 20, 0.10);
        }
        .drop-zone.zone-radar.drag-over {
            border-color: #c08030;
            background: rgba(180, 100, 20, 0.04);
        }

        /* ===== 卡片池 ===== */
        .card-pool {
            background: rgba(255, 255, 255, 0.30);
            border-radius: 22px;
            padding: 18px 20px 16px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            margin-bottom: 18px;
            min-height: 70px;
            backdrop-filter: blur(4px);
        }
        .card-pool .pool-label {
            font-size: 12px;
            font-weight: 500;
            color: #4a6080;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .card-pool .pool-items {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        /* ===== 可拖拽卡片（无分类标签） ===== */
        .draggable-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 10px 10px;
            background: rgba(255, 255, 255, 0.65);
            border-radius: 18px;
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 20px rgba(60, 80, 120, 0.08);
            touch-action: none;
            min-width: 80px;
            flex: 0 0 auto;
            position: relative;
        }
        .draggable-card:hover {
            background: rgba(255, 255, 255, 0.85);
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(60, 80, 120, 0.12);
        }
        .draggable-card:active {
            cursor: grabbing;
        }
        .draggable-card .card-graphic {
            width: 80px;
            height: 80px;
            border-radius: 14px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.30);
            flex-shrink: 0;
        }
        .draggable-card .card-graphic canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .draggable-card .card-name {
            font-size: 12px;
            font-weight: 500;
            color: #1a2c44;
            text-align: center;
            line-height: 1.3;
            max-width: 80px;
            word-break: break-word;
        }
        .draggable-card.dragging {
            opacity: 0.35;
            transform: scale(0.92);
        }

        /* 拖拽克隆体 */
        .drag-clone {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 10px 14px 12px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 30px 80px rgba(40, 60, 100, 0.15);
            transform: translate(-50%, -50%) scale(1.10);
            transition: none;
        }
        .drag-clone .card-graphic {
            width: 90px;
            height: 90px;
            border-radius: 16px;
            overflow: hidden;
        }
        .drag-clone .card-graphic canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .drag-clone .card-name {
            font-size: 13px;
            font-weight: 600;
            color: #0a1e3a;
        }

        /* ===== 控制按钮 ===== */
        .controls {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .btn {
            padding: 10px 32px;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.40);
            color: #2a4a6a;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            letter-spacing: 0.3px;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.65);
            color: #0a1e3a;
            transform: translateY(-2px);
        }
        .btn-primary {
            background: linear-gradient(135deg, #4a8ecf, #2a6aaa);
            color: #fff;
            border: none;
            box-shadow: 0 8px 28px rgba(40, 80, 160, 0.15);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #5a9edf, #3a7aba);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(40, 80, 160, 0.20);
        }
        .btn-hint {
            background: rgba(180, 100, 20, 0.08);
            color: #a06020;
            border-color: rgba(180, 100, 20, 0.10);
        }
        .btn-hint:hover {
            background: rgba(180, 100, 20, 0.15);
            color: #7a4a10;
        }

        /* ===== 反馈浮层 ===== */
        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            padding: 16px 36px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 700;
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10000;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #0a1e3a;
            box-shadow: 0 30px 80px rgba(40, 60, 100, 0.12);
            text-align: center;
            max-width: 90%;
        }
        .feedback.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .feedback.success {
            border-color: rgba(30, 120, 70, 0.20);
            color: #1a7a4a;
        }
        .feedback.error {
            border-color: rgba(200, 60, 50, 0.20);
            color: #b04030;
        }
        .feedback.info {
            border-color: rgba(40, 80, 160, 0.20);
            color: #2a5a8a;
        }

        /* ===== 胜利弹窗 ===== */
        .victory-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.50);
            backdrop-filter: blur(14px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            animation: fadeIn 0.5s ease;
        }
        .victory-overlay.active {
            display: flex;
        }
        .victory-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 44px;
            padding: 40px 44px 36px;
            max-width: 440px;
            width: 92%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 40px 120px rgba(40, 60, 100, 0.10);
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .victory-box .trophy {
            font-size: 64px;
            margin-bottom: 8px;
            display: block;
        }
        .victory-box h2 {
            font-size: 28px;
            font-weight: 700;
            color: #0a1e3a;
            margin-bottom: 6px;
        }
        .victory-box .sub {
            color: #4a6080;
            font-size: 15px;
            margin-bottom: 6px;
        }
        .victory-box .time-result {
            color: #4a6080;
            font-size: 15px;
            margin-bottom: 20px;
        }
        .victory-box .time-result span {
            color: #1a4a7a;
            font-weight: 600;
        }
        .victory-box .btn {
            min-width: 150px;
        }

        /* ===== 知识卡片（提示） ===== */
        .knowledge-popup {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 14px 24px 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 60px rgba(40, 60, 100, 0.08);
            z-index: 9998;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 90%;
            pointer-events: none;
            text-align: center;
        }
        .knowledge-popup.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .knowledge-popup .k-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a4a7a;
        }
        .knowledge-popup .k-desc {
            font-size: 13px;
            color: #3a5a7a;
            margin-top: 2px;
        }

        /* ===== 庆祝画布 ===== */
        #confetti-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 99998;
        }

        /* ===== 动画 ===== */
        @keyframes popIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-12px);
            }
            75% {
                transform: translateX(12px);
            }
        }
        .shake {
            animation: shake 0.4s ease;
        }
        @keyframes pulse-glow {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(40, 80, 160, 0);
            }
            50% {
                box-shadow: 0 0 40px rgba(40, 80, 160, 0.06);
            }
        }
        .drop-zone.highlight-pulse {
            animation: pulse-glow 1.2s ease 2;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 820px) {
            .game-wrapper {
                padding: 16px 14px 22px;
                border-radius: 32px;
            }
            .drop-zones {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .drop-zone {
                min-height: 80px;
                padding: 12px 12px 14px;
            }
            .header .title-group h1 {
                font-size: 20px;
            }
            .header .title-group .sub {
                display: none;
            }
            .stats {
                padding: 4px 12px 4px 16px;
                gap: 12px;
            }
            .stats .progress-wrap {
                width: 70px;
            }
            .draggable-card .card-graphic {
                width: 64px;
                height: 64px;
            }
            .draggable-card {
                min-width: 64px;
                padding: 6px 8px 8px;
            }
            .draggable-card .card-name {
                font-size: 10px;
                max-width: 64px;
            }
            .drag-clone .card-graphic {
                width: 72px;
                height: 72px;
            }
            .card-pool {
                padding: 12px 12px 10px;
            }
            .victory-box {
                padding: 30px 24px 28px;
            }
            .victory-box .trophy {
                font-size: 48px;
            }
            .victory-box h2 {
                font-size: 22px;
            }
            .feedback {
                font-size: 16px;
                padding: 12px 24px;
            }
        }
        @media (max-width: 480px) {
            .game-wrapper {
                padding: 12px 8px 16px;
                border-radius: 24px;
            }
            .title-group h1 {
                font-size: 17px;
            }
            .title-group .logo {
                font-size: 22px;
            }
            .stats .score {
                font-size: 13px;
            }
            .stats .score span {
                font-size: 17px;
            }
            .stats .timer {
                font-size: 12px;
            }
            .draggable-card .card-graphic {
                width: 54px;
                height: 54px;
            }
            .draggable-card {
                min-width: 54px;
                padding: 4px 6px 6px;
                border-radius: 14px;
            }
            .draggable-card .card-name {
                font-size: 9px;
                max-width: 54px;
            }
            .drag-clone .card-graphic {
                width: 60px;
                height: 60px;
            }
            .drag-clone {
                padding: 8px 10px 10px;
            }
            .drop-zone .zone-header .label {
                font-size: 14px;
            }
            .btn {
                padding: 8px 20px;
                font-size: 13px;
            }
            .card-pool .pool-items {
                gap: 8px;
            }
            .card-pool .pool-label {
                font-size: 10px;
                margin-bottom: 8px;
            }
            .drop-zone .zone-items .chip {
                font-size: 11px;
                padding: 3px 10px 3px 8px;
            }
            .drop-zone .zone-items .chip .mini-icon {
                width: 22px;
                height: 22px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 反馈浮层 ===== -->
    <div class="feedback" id="feedback"></div>

    <!-- ===== 知识提示 ===== -->
    <div class="knowledge-popup" id="knowledgePopup">
        <div class="k-title" id="kTitle">📖 小知识</div>
        <div class="k-desc" id="kDesc">传感器的工作原理</div>
    </div>

    <!-- ===== 胜利弹窗 ===== -->
    <div class="victory-overlay" id="victoryOverlay">
        <div class="victory-box">
            <span class="trophy">🏆</span>
            <h2>全部识别成功！</h2>
            <p class="sub">你已掌握所有传感器的图形特征！</p>
            <p class="time-result">⏱️ 用时 <span id="finalTime">0</span> 秒</p>
            <button class="btn btn-primary" onclick="resetGame()">🔄 再来一局</button>
        </div>
    </div>

    <!-- ===== 庆祝画布 ===== -->
    <canvas id="confetti-canvas"></canvas>

    <!-- ===== 主游戏 ===== -->
    <div class="game-wrapper">
        <!-- 头部 -->
        <div class="header">
            <div class="title-group">
                <span class="logo">🔍</span>
                <h1>传感器识别<span class="sub">· 图形挑战</span></h1>
            </div>
            <div class="stats">
                <div class="score">🏅 <span id="scoreNum">0</span></div>
                <div class="progress-wrap">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="count" id="countDisplay">0/13</div>
                <div class="timer">⏱️ <span id="timerDisplay">0</span>s</div>
            </div>
        </div>

        <!-- 三个放置区 -->
        <div class="drop-zones" id="dropZones">
            <div class="drop-zone zone-camera" data-zone="camera">
                <div class="zone-header">
                    <span class="icon">📷</span>
                    <span class="label">摄像头类</span>
                    <span class="badge" id="badge-camera">0</span>
                </div>
                <div class="zone-items" id="zone-camera"></div>
            </div>
            <div class="drop-zone zone-module" data-zone="module">
                <div class="zone-header">
                    <span class="icon">🔌</span>
                    <span class="label">其他模块</span>
                    <span class="badge" id="badge-module">0</span>
                </div>
                <div class="zone-items" id="zone-module"></div>
            </div>
            <div class="drop-zone zone-radar" data-zone="radar">
                <div class="zone-header">
                    <span class="icon">📡</span>
                    <span class="label">雷达类</span>
                    <span class="badge" id="badge-radar">0</span>

    <script>
        // ================================================================
        //  1. 传感器数据 + 图形绘制函数（颜色已调深）
        // ================================================================

        const SENSOR_DEFS = [{
            id: 'mono',
            name: '单目摄像头',
            zone: 'camera',
            draw: function(ctx, w, h) {
                const cx = w / 2,
                    cy = h / 2,
                    r = Math.min(w, h) * 0.38;
                const grad = ctx.createRadialGradient(cx - r * 0.2, cy - r * 0.2, 0, cx, cy, r);
                grad.addColorStop(0, '#6a8cff');
                grad.addColorStop(0.5, '#2a4a8a');
                grad.addColorStop(1, '#0a1a3a');
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(150,200,255,0.8)';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, r * 0.6, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(40,80,180,0.5)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(100,180,255,0.5)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx - r * 0.3, cy - r * 0.35, r * 0.15, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx - r * 0.1, cy - r * 0.55, r * 0.06, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.font = `${r*0.3}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('📷', cx, cy + r * 0.05);
            }
        }, {
            id: 'stereo',
            name: '双目摄像头',
            zone: 'camera',
            draw: function(ctx, w, h) {
                const cx = w / 2,
                    cy = h / 2;
                const r = Math.min(w, h) * 0.22;
                const gap = r * 1.8;
                for (let side = -1; side <= 1; side += 2) {
                    const x = cx + side * gap / 2;
                    const grad = ctx.createRadialGradient(x - r * 0.2, cy - r * 0.2, 0, x, cy, r);
                    grad.addColorStop(0, '#6a8cff');
                    grad.addColorStop(0.5, '#2a4a8a');
                    grad.addColorStop(1, '#0a1a3a');
                    ctx.beginPath();
                    ctx.arc(x, cy, r, 0, Math.PI * 2);
                    ctx.fillStyle = grad;
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(150,200,255,0.7)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(x, cy, r * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(40,80,180,0.5)';
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x - r * 0.25, cy - r * 0.3, r * 0.12, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.fill();
                }
                ctx.strokeStyle = 'rgba(100,180,255,0.3)';
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 4]);
                ctx.beginPath();
                ctx.moveTo(cx - gap / 2 + r, cy);
                ctx.lineTo(cx + gap / 2 - r, cy);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }, {
            id: 'multi',
            name: '多目摄像头',
            zone: 'camera',
            draw: function(ctx, w, h) {
                const cx = w / 2,
                    cy = h / 2;
                const r = Math.min(w, h) * 0.16;
                const positions = [
                    [-1, -1],
                    [1, -1],
                    [0, 0.8],
                    [-0.6, 0.4],
                    [0.6, 0.4]
                ];
                const scale = Math.min(w, h) * 0.28;
                for (const [dx, dy] of positions) {
                    const x = cx + dx * scale;
                    const y = cy + dy * scale;
                    const grad = ctx.createRadialGradient(x - r * 0.2, y - r * 0.2, 0, x, y, r);
                    grad.addColorStop(0, '#6a8cff');
                    grad.addColorStop(0.6, '#2a4a8a');
                    grad.addColorStop(1, '#0a1a3a');
                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.fillStyle = grad;
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(150,200,255,0.5)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(x - r * 0.2, y - r * 0.25, r * 0.1, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.fill();
                }
                ctx.beginPath();
                ctx.arc(cx, cy, scale * 1.5, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(100,180,255,0.15)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }, {
            id: 'surround',
            name: '环视摄像头',
            zone: 'camera',
            draw: function(ctx, w, h) {
                const cx = w / 2,
                    cy = h / 2;
                const r = Math.min(w, h) * 0.32;
                const grad = ctx.createRadialGradient(cx - r * 0.1, cy - r * 0.1, 0, cx, cy, r);
                grad.addColorStop(0, '#7a9eff');
                grad.addColorStop(0.3, '#3a6abf');
                grad.addColorStop(0.7, '#1a3a7a');
                grad.addColorStop(1, '#0a1a3a');
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(150,200,255,0.6)';
                ctx.lineWidth = 2;
                ctx.stroke();
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    const x1 = cx + Math.cos(angle) * r * 0.3;
                    const y1 = cy + Math.sin(angle) * r * 0.3;
                    const x2 = cx + Math.cos(angle) * r * 0.9;
                    const y2 = cy + Math.sin(angle) * r * 0.9;
                    ctx.strokeStyle = 'rgba(100,200,255,0.15)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }
                for (let i = 1; i < 4; i++) {
                    const r2 = r * (0.3 + i * 0.2);
                    ctx.beginPath();
                    ctx.arc(cx, cy, r2, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(100,200,255,0.10)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                ctx.beginPath();
                ctx.arc(cx - r * 0.25, cy - r * 0.3, r * 0.12, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.font = `${r*0.2}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🔄', cx, cy + r * 0.02);
            }
        }, {
            id: 'infrared',
            name: '红外摄像头',
            zone: 'camera',
            draw: function(ctx, w, h) {
                const cx = w / 2,
                    cy = h / 2;
                const r = Math.min(w, h) * 0.36;
                const grad = ctx.createRadialGradient(cx - r * 0.1, cy - r * 0.2, 0, cx, cy, r);
                grad.addColorStop(0, '#ff6b35');
                grad.addColorStop(0.3, '#ff4500');
                grad.addColorStop(0.6, '#cc2200');
                grad.addColorStop(0.8, '#881100');
                grad.addColorStop(1, '#330000');
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,120,50,0.6)';
                ctx.lineWidth = 2;
                ctx.stroke();
                for (let i = 0; i < 8; i++) {
                    const y = cy - r * 0.7 + i * (r * 1.4 / 8);
                    ctx.fillStyle = `rgba(255,255,200,${0.05 + i*0.03})`;
                    ctx.fillRect(cx - r * 0.5, y, r * 1.0, r * 0.08);
                }
                ctx.strokeStyle = 'rgba(255,200,100,0.3)';
                ctx.lineWidth = 1;
                ctx.setLineDash([2, 4]);
                ctx.beginPath();
                ctx.moveTo(cx - r * 0.7, cy);
                ctx.lineTo(cx + r * 0.7, cy);
                ctx.moveTo(cx, cy - r * 0.7);
                ctx.lineTo(cx, cy + r * 0.7);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = 'rgba(255,200,100,0.3)';
                ctx.font = `${r*0.2}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText('🌡️', cx, cy + r * 0.8);
            }
        }, {
            id: 'millimeter',
            name: '毫米波雷达',
            zone: 'radar',
            draw: function(ctx, w, h) {
                const cx = w / 2,
                    cy = h / 2;
                const r = Math.min(w, h) * 0.35;
                // 扇形波束 - 颜色加深
                for (let i = 0; i < 5; i++) {
                    const angle = -Math.PI / 3 + i * (Math.PI * 2 / 3 / 4);
                    const r1 = r * 0.2 + i * (r * 0.8 / 4);
                    ctx.beginPath();
                    ctx.arc(cx, cy, r1, -Math.PI / 3, Math.PI / 3);
                    ctx.strokeStyle = `rgba(60,180,255,${0.25 + i*0.08})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
                grad.addColorStop(0, 'rgba(60,180,255,0.35)');
                grad.addColorStop(1, 'rgba(60,180,255,0)');
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, r, -Math.PI / 3, Math.PI / 3);
                ctx.closePath();
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.fillStyle = 'rgba(150,200,255,0.4)';
                ctx.fillRect(cx - 3, cy - r * 0.15, 6, r * 0.3);
                ctx.beginPath();
                ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(60,180,255,0.8)';
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.font = `${r*0.15}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText('📡', cx, cy + r * 0.9);
            }
        }, {
            id: 'ultrasonic',
            name: '超声波雷达',
            zone: 'radar',
            draw: function(ctx, w, h) {
                const cx = w / 2,
                    cy = h / 2;
                const r = Math.min(w, h) * 0.32;
                // 声波弧形 - 颜色加深
                for (let i = 0; i < 6; i++) {
                    const r1 = r * 0.15 + i * (r * 0.75 / 5);
                    ctx.beginPath();
                    ctx.arc(cx, cy, r1, -Math.PI * 0.8, Math.PI * 0.8);
                    ctx.strokeStyle = `rgba(255,200,80,${0.25 + i*0.08})`;
                    ctx.lineWidth = 2 + i * 0.4;
                    ctx.stroke();
                }
                ctx.fillStyle = 'rgba(255,200,80,0.3)';
                ctx.beginPath();
                ctx.ellipse(cx, cy, r * 0.15, r * 0.4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,200,80,0.5)';
                ctx.beginPath();
                ctx.ellipse(cx, cy, r * 0.06, r * 0.2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.font = `${r*0.15}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText('🔊', cx, cy + r * 0.9);
            }
        }, {
            id: 'mechanical_lidar',
            name: '机械式激光雷达',
            zone: 'radar',
            draw: function(ctx, w, h) {
                const cx = w / 2,
                    cy = h / 2;
                const r = Math.min(w, h) * 0.32;
                ctx.fillStyle = 'rgba(200,180,150,0.35)';
                ctx.beginPath();
                ctx.ellipse(cx, cy + r * 0.4, r * 0.7, r * 0.2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(200,180,150,0.4)';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.fillStyle = 'rgba(180,200,220,0.3)';
                ctx.beginPath();
                ctx.ellipse(cx, cy - r * 0.05, r * 0.3, r * 0.4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(180,200,220,0.4)';
                ctx.lineWidth = 1;
                ctx.stroke();
                // 旋转光束 - 颜色加深
                for (let i = 0; i < 12; i++) {
                    const angle = i * (Math.PI * 2 / 12) + 0.2;
                    const x1 = cx + Math.cos(angle) * r * 0.3;
                    const y1 = cy - r * 0.05 + Math.sin(angle) * r * 0.3;
                    const x2 = cx + Math.cos(angle) * r * 0.9;
                    const y2 = cy - r * 0.05 + Math.sin(angle) * r * 0.9;
                    ctx.strokeStyle = `rgba(80,255,180,${0.15 + (i%3)*0.06})`;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }
                ctx.fillStyle = 'rgba(80,255,180,0.3)';
                ctx.font = `${r*0.25}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⟳', cx, cy - r * 0.05);
            }
        }, {
            id: 'semisolid_lidar',
            name: '半固态激光雷达',
            zone: 'radar',
            draw: function(ctx, w, h) {
                const cx = w / 2,
                    cy = h / 2;
                const r = Math.min(w, h) * 0.30;
                const grad = ctx.createRadialGradient(cx - r * 0.2, cy - r * 0.2, 0, cx, cy, r);
                grad.addColorStop(0, 'rgba(180,220,255,0.30)');
                grad.addColorStop(0.5, 'rgba(100,180,255,0.25)');
                grad.addColorStop(1, 'rgba(40,100,200,0.15)');
                ctx.beginPath();
                ctx.roundRect(cx - r, cy - r * 0.8, r * 2, r * 1.6, r * 0.2);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(150,200,255,0.4)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // 内部阵列 - 颜色加深
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 6; j++) {
                        const x = cx - r * 0.7 + j * (r * 1.4 / 5);
                        const y = cy - r * 0.5 + i * (r * 1.0 / 3);
                        const s = r * 0.06;
                        ctx.fillStyle = `rgba(100,200,255,${0.2 + (i+j)*0.04})`;
                        ctx.fillRect(x - s / 2, y - s / 2, s, s);
                    }
                }
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.beginPath();
                ctx.roundRect(cx - r * 0.9, cy - r * 0.7, r * 1.8, r * 1.4, r * 0.15);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.font = `${r*0.15}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText('🔶', cx, cy + r * 0.7);
            }
        }, {
            id: 'solid_lidar',
            name: '固态激光雷达',
            zone: 'radar',
            draw: function(ctx, w, h) {
                const cx = w / 2,
                    cy = h / 2;
                const r = Math.min(w, h) * 0.30;
                const grad = ctx.createLinearGradient(cx - r, cy - r, cx + r, cy + r);
                grad.addColorStop(0, 'rgba(100,200,255,0.20)');
                grad.addColorStop(0.5, 'rgba(60,150,220,0.30)');
                grad.addColorStop(1, 'rgba(20,80,160,0.18)');
                ctx.beginPath();
                ctx.roundRect(cx - r, cy - r * 0.9, r * 2, r * 1.8, r * 0.15);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(100,200,255,0.4)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // 固态阵列 - 颜色加深
                for (let i = 0; i < 5; i++) {
                    for (let j = 0; j < 7; j++) {
                        const x = cx - r * 0.8 + j * (r * 1.6 / 6);
                        const y = cy - r * 0.65 + i * (r * 1.3 / 4);
                        const s = r * 0.05;
                        ctx.fillStyle = `rgba(100,200,255,${0.18 + (i+j)*0.025})`;
                        ctx.fillRect(x - s / 2, y - s / 2, s, s);
                    }
                }
                ctx.fillStyle = 'rgba(255,255,255,0.10)';
                ctx.font = `${r*0.15}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText('🔷', cx, cy + r * 0.7);
            }
        }, {
            id: 'gnss',
            name: 'GNSS/RTK定位',
            zone: 'module',
            draw: function(ctx, w, h) {
                const cx = w / 2,
                    cy = h / 2;
                const r = Math.min(w, h) * 0.32;
                ctx.fillStyle = 'rgba(200,220,255,0.20)';
                ctx.beginPath();
                ctx.arc(cx, cy - r * 0.2, r * 0.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(200,220,255,0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();
                for (let i = 0; i < 3; i++) {
                    const angle = i * (Math.PI * 2 / 3) + 0.3;
                    const x = cx + Math.cos(angle) * r * 0.8;
                    const y = cy - r * 0.2 + Math.sin(angle) * r * 0.8;
                    ctx.fillStyle = 'rgba(200,220,255,0.15)';
                    ctx.beginPath();
                    ctx.arc(x, y, r * 0.12, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(200,220,255,0.3)';
                    ctx.font = `${r*0.12}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🛰️', x, y);
                }
                ctx.fillStyle = 'rgba(100,255,200,0.4)';
                ctx.beginPath();
                ctx.arc(cx, cy + r * 0.4, r * 0.06, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(100,255,200,0.3)';
                ctx.beginPath();
                ctx.arc(cx, cy + r * 0.4, r * 0.12, 0, Math.PI * 2);
                ctx.fill();
                for (let i = 0; i < 3; i++) {
                    const r2 = r * 0.15 + i * r * 0.08;
                    ctx.beginPath();
                    ctx.arc(cx, cy + r * 0.4, r2, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(100,255,200,${0.10 - i*0.02})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                ctx.fillStyle = 'rgba(255,255,255,0.12)';
                ctx.font = `${r*0.13}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText('🛰️', cx, cy + r * 0.85);
            }
        }, {
            id: 'imu',
            name: '惯性测量单元',
            zone: 'module',
            draw: function(ctx, w, h) {
                const cx = w / 2,
                    cy = h / 2;
                const r = Math.min(w, h) * 0.30;
                // 陀螺仪环 - 颜色加深
                ctx.strokeStyle = 'rgba(80,255,180,0.30)';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.arc(cx, cy, r * 0.7, 0, Math.PI * 2);
                ctx.stroke();
                ctx.strokeStyle = 'rgba(80,255,180,0.20)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(cx, cy, r * 0.45, 0, Math.PI * 2);
                ctx.stroke();
                ctx.strokeStyle = 'rgba(80,255,180,0.15)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(cx, cy, r * 0.2, 0, Math.PI * 2);
                ctx.stroke();
                ctx.strokeStyle = 'rgba(80,255,180,0.20)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(cx - r * 0.8, cy);
                ctx.lineTo(cx + r * 0.8, cy);
                ctx.moveTo(cx, cy - r * 0.8);
                ctx.lineTo(cx, cy + r * 0.8);
                ctx.stroke();
                ctx.fillStyle = 'rgba(80,255,180,0.4)';
                ctx.beginPath();
                ctx.arc(cx, cy, r * 0.06, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(80,255,180,0.30)';
                ctx.font = `${r*0.2}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⟳', cx, cy);
                ctx.fillStyle = 'rgba(255,255,255,0.10)';
                ctx.font = `${r*0.12}px sans-serif`;
                ctx.textBaseline = 'bottom';
                ctx.fillText('⚖️', cx, cy + r * 0.85);
            }
        }, {
            id: 'v2x',
            name: 'V2X通信模块',
            zone: 'module',
            draw: function(ctx, w, h) {
                const cx = w / 2,
                    cy = h / 2;
                const r = Math.min(w, h) * 0.32;
                // 通信信号波纹 - 颜色加深
                for (let i = 0; i < 5; i++) {
                    const r1 = r * 0.15 + i * (r * 0.7 / 4);
                    ctx.beginPath();
                    ctx.arc(cx, cy, r1, -Math.PI * 0.6, Math.PI * 0.6);
                    ctx.strokeStyle = `rgba(80,200,255,${0.15 + i*0.08})`;
                    ctx.lineWidth = 2 + i * 0.3;
                    ctx.stroke();
                }
                ctx.strokeStyle = 'rgba(80,200,255,0.30)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(cx - r * 0.5, cy - r * 0.3);
                ctx.lineTo(cx + r * 0.5, cy + r * 0.3);
                ctx.moveTo(cx + r * 0.5, cy + r * 0.3);
                ctx.lineTo(cx + r * 0.3, cy + r * 0.15);
                ctx.moveTo(cx + r * 0.5, cy + r * 0.3);
                ctx.lineTo(cx + r * 0.35, cy + r * 0.4);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx + r * 0.5, cy - r * 0.3);
                ctx.lineTo(cx - r * 0.5, cy + r * 0.3);
                ctx.moveTo(cx - r * 0.5, cy + r * 0.3);
                ctx.lineTo(cx - r * 0.3, cy + r * 0.15);
                ctx.moveTo(cx - r * 0.5, cy + r * 0.3);
                ctx.lineTo(cx - r * 0.35, cy + r * 0.4);
                ctx.stroke();
                ctx.fillStyle = 'rgba(80,200,255,0.15)';
                ctx.fillRect(cx - 2, cy - r * 0.7, 4, r * 0.25);
                ctx.fillStyle = 'rgba(255,255,255,0.10)';
                ctx.font = `${r*0.15}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText('📶', cx, cy + r * 0.85);
            }
        }];

        // ================================================================
        //  2. 工具函数
        // ================================================================

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
                const r = typeof radii === 'number' ? radii : (radii || 0);
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                return this;
            };
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function showFeedback(text, type = 'success') {
            const el = document.getElementById('feedback');
            el.textContent = text;
            el.className = 'feedback show ' + type;
            clearTimeout(el._timer);
            el._timer = setTimeout(() => { el.className = 'feedback'; }, 750);
        }

        function showKnowledge(text, title = '📖 小知识') {
            const popup = document.getElementById('knowledgePopup');
            document.getElementById('kTitle').textContent = title;
            document.getElementById('kDesc').textContent = text;
            popup.classList.add('show');
            clearTimeout(popup._timer);
            popup._timer = setTimeout(() => { popup.classList.remove('show'); }, 3500);
        }

        const knowledgeMap = {
            '单目摄像头': '单目摄像头通过一个镜头采集图像，利用算法估计深度，常用于自动驾驶和手机拍照。',
            '双目摄像头': '双目摄像头模拟人眼，通过两个镜头视差计算深度信息，精度更高。',
            '多目摄像头': '多目摄像头使用多个镜头覆盖不同视野，用于全景成像和3D重建。',
            '环视摄像头': '环视摄像头提供360°全景视野，常用于车载环视系统和VR设备。',
            '红外摄像头': '红外摄像头探测热辐射，可在夜间或恶劣天气下成像，用于安防和热成像。',
            '毫米波雷达': '毫米波雷达发射毫米波频段信号，探测距离和速度，抗干扰能力强。',
            '超声波雷达': '超声波雷达通过声波回波测距，常用于倒车雷达和短距离探测。',
            '机械式激光雷达': '机械式激光雷达通过旋转部件扫描环境，生成3D点云，精度高但体积较大。',
            '半固态激光雷达': '半固态激光雷达采用微镜或转镜技术，兼顾性能和可靠性。',
            '固态激光雷达': '固态激光雷达无运动部件，采用光学相控阵等技术，体积小、可靠性高。',
            'GNSS/RTK定位': 'GNSS/RTK利用卫星信号和差分技术实现厘米级高精度定位。',
            '惯性测量单元': 'IMU测量加速度和角速度，用于姿态估计和惯性导航，是自动驾驶的核心传感器。',
            'V2X通信模块': 'V2X实现车与车、车与路侧设施通信，提升交通安全和效率。'
        };

        function showRandomKnowledge() {
            const keys = Object.keys(knowledgeMap);
            const key = keys[Math.floor(Math.random() * keys.length)];
            showKnowledge(knowledgeMap[key], '💡 ' + key);
        }

        // ================================================================
        //  3. 游戏状态
        // ================================================================

        let state = {
            pool: [],
            placed: { camera: [], module: [], radar: [] },
            total: SENSOR_DEFS.length,
            score: 0,
            isDragging: false,
            dragData: null,
            timer: 0,
            timerInterval: null,
            started: false,
        };

        const sensorMap = Object.fromEntries(SENSOR_DEFS.map(s => [s.id, s]));

        // ================================================================
        //  4. DOM 引用
        // ================================================================

        const $ = id => document.getElementById(id);
        const poolItems = $('poolItems');
        const scoreNum = $('scoreNum');
        const progressBar = $('progressBar');
        const countDisplay = $('countDisplay');
        const timerDisplay = $('timerDisplay');
        const finalTime = $('finalTime');
        const victoryOverlay = $('victoryOverlay');
        const zoneElements = {
            camera: $('zone-camera'),
            module: $('zone-module'),
            radar: $('zone-radar'),
        };
        const badgeElements = {
            camera: $('badge-camera'),
            module: $('badge-module'),
            radar: $('badge-radar'),
        };
        const dropZoneContainers = document.querySelectorAll('.drop-zone');

        // ================================================================
        //  5. 图形绘制
        // ================================================================

        function drawSensorOnCanvas(canvas, sensorId) {
            const def = sensorMap[sensorId];
            if (!def) return;
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            const w = canvas.width / dpr;
            const h = canvas.height / dpr;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.scale(dpr, dpr);
            def.draw(ctx, w, h);
            ctx.restore();
        }

        function createSensorCanvas(sensorId, size = 80) {
            const canvas = document.createElement('canvas');
            const dpr = window.devicePixelRatio || 1;
            canvas.width = size * dpr;
            canvas.height = size * dpr;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            requestAnimationFrame(() => {
                drawSensorOnCanvas(canvas, sensorId);
            });
            return canvas;
        }

        // ================================================================
        //  6. 渲染
        // ================================================================

        function render() {
            scoreNum.textContent = state.score;
            const total = state.total;
            const done = state.score;
            countDisplay.textContent = `${done}/${total}`;
            const pct = total === 0 ? 0 : (done / total) * 100;
            progressBar.style.width = Math.min(pct, 100) + '%';

            poolItems.innerHTML = '';
            if (state.pool.length === 0) {
                const empty = document.createElement('div');
                empty.style.cssText =
                    'color: rgba(60,80,120,0.25); font-size: 14px; padding: 12px 0; width:100%; text-align:center;';
                empty.textContent = '🎉 所有传感器已分类完毕！';
                poolItems.appendChild(empty);
            } else {
                for (const id of state.pool) {
                    const def = sensorMap[id];
                    if (!def) continue;
                    const card = createCard(def);
                    poolItems.appendChild(card);
                }
            }

            for (const [zoneKey, container] of Object.entries(zoneElements)) {
                container.innerHTML = '';
                const placedIds = state.placed[zoneKey] || [];
                if (placedIds.length === 0) {
                    const hint = document.createElement('div');
                    hint.className = 'empty-hint';
                    hint.textContent = '⬇ 拖拽到此';
                    container.appendChild(hint);
                } else {
                    for (const id of placedIds) {
                        const def = sensorMap[id];
                        if (!def) continue;
                        const chip = document.createElement('span');
                        chip.className = 'chip';
                        const miniCanvas = createSensorCanvas(id, 28);
                        const wrapper = document.createElement('span');
                        wrapper.className = 'mini-icon';
                        wrapper.appendChild(miniCanvas);
                        chip.appendChild(wrapper);
                        const nameSpan = document.createElement('span');
                        nameSpan.textContent = def.name;
                        chip.appendChild(nameSpan);
                        container.appendChild(chip);
                    }
                }
                badgeElements[zoneKey].textContent = placedIds.length;
            }

            if (state.score === state.total && state.total > 0) {
                stopTimer();
                finalTime.textContent = state.timer;
                setTimeout(() => {
                    victoryOverlay.classList.add('active');
                    startConfetti();
                }, 500);
            }
        }

        // ================================================================
        //  7. 创建卡片 (无分类标签)
        // ================================================================

        function createCard(def) {
            const div = document.createElement('div');
            div.className = 'draggable-card';
            div.dataset.id = def.id;
            div.dataset.zone = def.zone;

            const graphic = document.createElement('div');
            graphic.className = 'card-graphic';
            const canvas = createSensorCanvas(def.id, 80);
            graphic.appendChild(canvas);
            div.appendChild(graphic);

            const nameEl = document.createElement('div');
            nameEl.className = 'card-name';
            nameEl.textContent = def.name;
            div.appendChild(nameEl);

            div.addEventListener('mousedown', (e) => {
                e.preventDefault();
                if (state.isDragging) return;
                if (!state.pool.includes(def.id)) return;
                startDrag(e.clientX, e.clientY, def, div);
            });

            div.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                if (state.isDragging) return;
                if (!state.pool.includes(def.id)) return;
                startDrag(touch.clientX, touch.clientY, def, div);
            }, { passive: true });

            return div;
        }

        // ================================================================
        //  8. 拖拽系统
        // ================================================================

        let dragState = null;

        function startDrag(clientX, clientY, def, element) {
            state.isDragging = true;
            state.started = true;
            if (!state.timerInterval) {
                state.timer = 0;
                state.timerInterval = setInterval(() => {
                    state.timer++;
                    timerDisplay.textContent = state.timer;
                }, 1000);
            }

            const rect = element.getBoundingClientRect();
            const offsetX = clientX - rect.left;
            const offsetY = clientY - rect.top;

            const clone = document.createElement('div');
            clone.className = 'drag-clone';
            const graphic = document.createElement('div');
            graphic.className = 'card-graphic';
            const canvas = createSensorCanvas(def.id, 90);
            graphic.appendChild(canvas);
            clone.appendChild(graphic);
            const nameEl = document.createElement('div');
            nameEl.className = 'card-name';
            nameEl.textContent = def.name;
            clone.appendChild(nameEl);
            clone.style.left = clientX + 'px';
            clone.style.top = clientY + 'px';
            document.body.appendChild(clone);

            element.classList.add('dragging');

            dragState = { def, element, clone, offsetX, offsetY };

            dropZoneContainers.forEach(el => el.classList.add('drag-over'));
        }

        function onMove(clientX, clientY) {
            if (!dragState) return;
            dragState.clone.style.left = clientX + 'px';
            dragState.clone.style.top = clientY + 'px';

            let targetZone = null;
            dropZoneContainers.forEach(zone => {
                const rect = zone.getBoundingClientRect();
                if (clientX >= rect.left && clientX <= rect.right &&
                    clientY >= rect.top && clientY <= rect.bottom) {
                    targetZone = zone;
                }
                zone.classList.remove('drag-over-highlight');
            });
            dropZoneContainers.forEach(zone => {
                zone.classList.remove('drag-over');
                if (zone === targetZone) {
                    zone.classList.add('drag-over');
                }
            });
        }

        function onEnd(clientX, clientY) {
            if (!dragState) return;
            const { def, element, clone } = dragState;

            clone.remove();
            element.classList.remove('dragging');

            dropZoneContainers.forEach(el => {
                el.classList.remove('drag-over');
                el.classList.remove('drag-over-highlight');
            });

            let targetZoneKey = null;
            dropZoneContainers.forEach(zone => {
                const rect = zone.getBoundingClientRect();
                if (clientX >= rect.left && clientX <= rect.right &&
                    clientY >= rect.top && clientY <= rect.bottom) {
                    targetZoneKey = zone.dataset.zone;
                }
            });

            let success = false;
            if (targetZoneKey) {
                if (targetZoneKey === def.zone) {
                    success = true;
                    const idx = state.pool.indexOf(def.id);
                    if (idx !== -1) state.pool.splice(idx, 1);
                    state.placed[def.zone].push(def.id);
                    state.score++;
                    const zoneLabel = { camera: '摄像头类', module: '其他模块', radar: '雷达类' };
                    showFeedback(`✅ 正确！${def.name} → ${zoneLabel[def.zone]}`, 'success');
                    if (knowledgeMap[def.name]) {
                        setTimeout(() => {
                            showKnowledge(knowledgeMap[def.name], `📖 ${def.name}`);
                        }, 400);
                    }
                    render();
                } else {
                    const zoneLabel = { camera: '摄像头类', module: '其他模块', radar: '雷达类' };
                    showFeedback(`❌ ${def.name} 不属于 ${zoneLabel[targetZoneKey]}`, 'error');
                    element.classList.add('shake');
                    setTimeout(() => element.classList.remove('shake'), 450);
                }
            } else {
                showFeedback('↩️ 请拖到上方对应的分类区域', 'info');
            }

            state.isDragging = false;
            dragState = null;
        }

        document.addEventListener('mousemove', (e) => {
            if (state.isDragging) { e.preventDefault();
                onMove(e.clientX, e.clientY); }
        });
        document.addEventListener('mouseup', (e) => {
            if (state.isDragging) { e.preventDefault();
                onEnd(e.clientX, e.clientY); }
        });
        document.addEventListener('touchmove', (e) => {
            if (state.isDragging) { e.preventDefault(); const t = e.touches[0];
                onMove(t.clientX, t.clientY); }
        }, { passive: false });
        document.addEventListener('touchend', (e) => {
            if (state.isDragging) { e.preventDefault(); const t = e.changedTouches[0];
                onEnd(t.clientX, t.clientY); }
        }, { passive: false });

        // ================================================================
        //  9. 计时器
        // ================================================================

        function stopTimer() {
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
        }

        // ================================================================
        //  10. 胜利 & 庆祝
        // ================================================================

        let confettiActive = false;
        let confettiAnimId = null;

        function startConfetti() {
            if (confettiActive) return;
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            confettiActive = true;

            const particles = [];
            const colors = ['#4a8ecf', '#2a6aaa', '#f7b773', '#2a9a6a', '#d06050', '#f0c040', '#8a7adf', '#d07090', '#d08030'];
            for (let i = 0; i < 180; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    w: 6 + Math.random() * 8,
                    h: 3 + Math.random() * 6,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    vx: (Math.random() - 0.5) * 2.5,
                    vy: 1.8 + Math.random() * 3.5,
                    rot: Math.random() * 360,
                    rv: (Math.random() - 0.5) * 5,
                });
            }

            function drawConfetti() {
                if (!confettiActive) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let alive = false;
                for (const p of particles) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.rot += p.rv;
                    if (p.y < canvas.height + 30) alive = true;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate((p.rot * Math.PI) / 180);
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 12;
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.restore();
                }
                confettiAnimId = requestAnimationFrame(drawConfetti);
                if (!alive) {
                    confettiActive = false;
                    cancelAnimationFrame(confettiAnimId);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            drawConfetti();
        }

        function stopConfetti() {
            confettiActive = false;
            if (confettiAnimId) {
                cancelAnimationFrame(confettiAnimId);
                confettiAnimId = null;
            }
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // ================================================================
        //  11. 重置
        // ================================================================

        function resetGame() {
            victoryOverlay.classList.remove('active');
            stopConfetti();
            stopTimer();
            state.timer = 0;
            timerDisplay.textContent = '0';
            state.started = false;

            const allIds = SENSOR_DEFS.map(s => s.id);
            state.pool = shuffle([...allIds]);
            state.placed = { camera: [], module: [], radar: [] };
            state.score = 0;
            state.isDragging = false;
            if (dragState) {
                dragState.clone && dragState.clone.remove();
                dragState.element && dragState.element.classList.remove('dragging');
                dragState = null;
            }
            dropZoneContainers.forEach(el => {
                el.classList.remove('drag-over');
                el.classList.remove('drag-over-highlight');
            });
            render();
            showFeedback('🔄 新的一局！观察图形拖拽分类', 'info');
            setTimeout(() => {
                showKnowledge('👀 仔细观察每个传感器的图形特征，拖拽到对应的分类区域！', '🎯 游戏目标');
            }, 600);
        }

        // ================================================================
        //  12. 窗口自适应 & 启动
        // ================================================================

        window.addEventListener('resize', () => {
            const canvas = document.getElementById('confetti-canvas');
            if (canvas) { canvas.width = window.innerWidth;
                canvas.height = window.innerHeight; }
            document.querySelectorAll('.card-graphic canvas, .mini-icon canvas, .drag-clone .card-graphic canvas').forEach(
                canvas => {
                    const parent = canvas.closest('.card-graphic') || canvas.closest('.mini-icon');
                    if (parent) {
                        const size = parent.classList.contains('mini-icon') ? 28 : 80;
                        const dpr = window.devicePixelRatio || 1;
                        canvas.width = size * dpr;
                        canvas.height = size * dpr;
                        canvas.style.width = size + 'px';
                        canvas.style.height = size + 'px';
                        let sensorId = 'mono';
                        const card = canvas.closest('.draggable-card');
                        if (card && card.dataset.id) sensorId = card.dataset.id;
                        else {
                            const chip = canvas.closest('.chip');
                            if (chip) {
                                const name = chip.textContent.trim();
                                for (const [k, v] of Object.entries(sensorMap)) {
                                    if (v.name === name) { sensorId = k; break; }
                                }
                            }
                        }
                        drawSensorOnCanvas(canvas, sensorId);
                    }
                });
        });

        resetGame();

        document.querySelector('.card-pool').addEventListener('click', (e) => {
            if (e.target.closest('.draggable-card')) return;
            if (state.pool.length > 0) {
                showKnowledge('👆 拖拽卡片到上方对应的分类区域', '💡 操作提示');
            }
        });

        console.log('🔍 传感器图形识别挑战已启动！');
        console.log('📊 共 ' + SENSOR_DEFS.length + ' 种传感器，3 个分类');
    </script>
</body>
</html>
